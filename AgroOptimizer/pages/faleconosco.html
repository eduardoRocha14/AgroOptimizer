<head>
    <link rel="stylesheet" href="../src/css/faleconosco.css">
    <script src="../src/js/faleconosco.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-12">
            <iframe src="../src/components/header.html" class="header-frame" scrolling="no"></iframe>
        </div>
    </div>

    <div class="row justify-content-center align-items-center content-area">
        <div class="col-md-6">
            <div class="form-container">
                <h2>Fale Conosco</h2>
                <form id="contactForm">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email:</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">Telefone:</label>
                        <input type="text" class="form-control" id="phone" required>
                    </div>
                    <div class="mb-3">
                        <label for="message" class="form-label">Como podemos te ajudar?</label>
                        <textarea class="form-control" id="message" rows="4" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-success">Enviar</button>
                </form>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-12">
            <iframe src="../src/components/footer.html" class="footer-frame" scrolling="no"></iframe>
        </div>
    </div>
</div>
